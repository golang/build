apiVersion: apps/v1
kind: Deployment
metadata:
  name: devapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devapp
  template:
    metadata:
      labels:
        app: devapp
    spec:
      containers:
      - name: devapp
        image: gcr.io/go-dashboard-dev/devapp:latest
        imagePullPolicy: Always
        command: ["/devapp", "-listen=:80", "-autocert-bucket=golang-devapp-dev-autocert"]
        securityContext:
          seccompProfile:
            type: RuntimeDefault
          appArmorProfile:
            type: RuntimeDefault
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
        ports:
        - containerPort: 80
        - containerPort: 443
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            memory: "4Gi"
